<!DOCTYPE html>
<html>
<head>
    <title>FlowICT Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>FlowICT - Pipe Flow Analyzer</h1>

<div class="container">

    <label>Pipe Length (m)</label>
    <input type="number" id="length">

    <label>Pipe Diameter (m)</label>
    <input type="number" id="diameter">

    <label>Fluid Density (kg/m³)</label>
    <input type="number" id="density">

    <label>Fluid Viscosity (Pa·s)</label>
    <input type="number" id="viscosity">

    <label>Velocity (m/s)</label>
    <input type="number" id="velocity">

    <button onclick="calculate()">Analyze Flow</button>

    <div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
